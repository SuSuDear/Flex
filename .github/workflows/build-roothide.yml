name: Build roothide

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    name: Build roothide package
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Theos roothide
        run: |
          brew install dpkg ldid make xz
          git clone --recursive https://github.com/roothide/theos.git "$HOME/theos-roothide"

      - name: Build package
        run: |
          source devkit/roothide.sh
          FINALPACKAGE=1 gmake clean package

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: roothide-packages
          path: packages/*.deb
          if-no-files-found: error
